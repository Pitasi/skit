<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Test</title>
<meta name="author" content="Test Author">
<link rel="stylesheet" href="/assets/reveal/dist/reset.css">
<link rel="stylesheet" href="/assets/reveal/dist/reveal.css">
<link rel="stylesheet" href="/assets/reveal/plugin/highlight/monokai.css">
<link rel="stylesheet" href="/assets/theme.css" id="theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.reveal .slides section { text-align: left; }

 
.reveal .slides section .cells {
  display: flex;
  flex-direction: column;
  height: 100%;
}

 
.reveal .slides section.layout-center .cells {
  justify-content: center;
  align-items: center;
  text-align: center;
}

 
.reveal .slides section.layout-split .cells {
  flex-direction: row;
  align-items: center;
  gap: 2rem;
}
.reveal .slides section.layout-split .cells > .cell {
  flex: 1;
  min-width: 0;
}

 
.reveal .slides section.layout-split-right .cells {
  flex-direction: row-reverse;
  align-items: center;
  gap: 2rem;
}
.reveal .slides section.layout-split-right .cells > .cell {
  flex: 1;
  min-width: 0;
}

 
.reveal .slides section.layout-split-3 .cells {
  flex-direction: row;
  align-items: center;
  gap: 2rem;
}
.reveal .slides section.layout-split-3 .cells > .cell {
  flex: 1;
  min-width: 0;
}

 
.reveal .slides section.layout-grid .cells {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  align-items: center;
}

 
.reveal .slides section.layout-top-bottom .cells {
  justify-content: center;
  gap: 2rem;
}
.reveal .slides section.layout-top-bottom .cells > .cell {
  flex: 1;
  min-height: 0;
}

 
.reveal .slides section.layout-background .cells {
  position: relative;
  height: 100%;
}
.reveal .slides section.layout-background .cells > .cell:first-child {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.reveal .slides section.layout-background .cells > .cell:first-child img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.reveal .slides section.layout-background .cells > .cell:not(:first-child) {
  position: relative;
  z-index: 1;
}

 
.reveal .slides section.layout-caption-left .cells {
  flex-direction: row;
  align-items: center;
  gap: 2rem;
}
.reveal .slides section.layout-caption-left .cells > .cell:first-child {
  flex: 0 0 35%;
}
.reveal .slides section.layout-caption-left .cells > .cell:nth-child(2) {
  flex: 1;
  min-width: 0;
}

 
.reveal .slides section.layout-caption-right .cells {
  flex-direction: row;
  align-items: center;
  gap: 2rem;
}
.reveal .slides section.layout-caption-right .cells > .cell:first-child {
  flex: 1;
  min-width: 0;
}
.reveal .slides section.layout-caption-right .cells > .cell:nth-child(2) {
  flex: 0 0 35%;
}

 
.reveal .slides section .cell img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
</style>
</head>
<body>
<div class="reveal">
<div class="slides">

<section data-slide-index="0" data-title="First Slide">
<div class="cells">
<div class="cell">
<h1 id="first-slide">First Slide</h1>

</div>
<div class="cell">
<p>Visible text on the slide.</p>

</div>
</div>

<aside class="notes">
<p>Speaker notes for the first slide.</p>

</aside>
</section>

<section data-slide-index="1" data-title="Second Slide">
<div class="cells">
<div class="cell">
<h1 id="second-slide">Second Slide</h1>

</div>
<div class="cell">
<p>Directive content visible on slide.</p>

</div>
</div>

<aside class="notes">
<p>More speaker notes.</p>

</aside>
</section>

</div>
</div>
<script src="/assets/reveal/dist/reveal.js"></script>
<script src="/assets/reveal/plugin/notes/notes.js"></script>
<script src="/assets/reveal/plugin/highlight/highlight.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true},{left: '$', right: '$', display: false}]});">
</script>
<script>
Reveal.initialize({
  hash: true,
  width: 1920, height: 1080,
  
  
  
  
  plugins: [ RevealNotes, RevealHighlight ]
});
</script>
</body>
</html>
